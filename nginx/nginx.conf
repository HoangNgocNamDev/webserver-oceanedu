events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    # Increase timeout limits for Heavy AI tasks (Azure + OpenRouter LLM APIs)
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    upstream frontend {
        server host.docker.internal:3001;
    }

    upstream backend {
        server host.docker.internal:3000;
    }

    upstream speaking-frontend {
        server host.docker.internal:5173;
    }

    # HTTP to HTTPS redirect for Frontend
    server {
        listen 80;
        server_name exam.oceanedu.local exam-admin.oceanedu.local exam-teacher.oceanedu.local;
        return 301 https://$host$request_uri;
    }

    # HTTPS configuration for Frontend domains
    server {
        listen 443 ssl http2;
        server_name exam.oceanedu.local exam-admin.oceanedu.local exam-teacher.oceanedu.local;

        ssl_certificate /etc/nginx/ssl/_wildcard.oceanedu.local+1.pem;
        ssl_certificate_key /etc/nginx/ssl/_wildcard.oceanedu.local+1-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTP to HTTPS redirect for Backend
    server {
        listen 80;
        server_name exam-api.oceanedu.local speaking-api.oceanedu.local;
        return 301 https://$host$request_uri;
    }

    # HTTPS configuration for Backend
    server {
        listen 443 ssl http2;
        server_name exam-api.oceanedu.local speaking-api.oceanedu.local;

        ssl_certificate /etc/nginx/ssl/_wildcard.oceanedu.local+1.pem;
        ssl_certificate_key /etc/nginx/ssl/_wildcard.oceanedu.local+1-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Pass through all headers from backend (no CORS handling in nginx)
            proxy_pass_header Set-Cookie;
        }
    }

    # HTTP to HTTPS redirect for Speaking-Frontend
    server {
        listen 80;
        server_name speaking.oceanedu.local;
        return 301 https://$host$request_uri;
    }

    # HTTPS configuration for Speaking-Frontend
    server {
        listen 443 ssl http2;
        server_name speaking.oceanedu.local;

        ssl_certificate /etc/nginx/ssl/_wildcard.oceanedu.local+1.pem;
        ssl_certificate_key /etc/nginx/ssl/_wildcard.oceanedu.local+1-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://speaking-frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
