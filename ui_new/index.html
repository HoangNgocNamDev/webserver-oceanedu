<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link href="css/style.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="flyer-web-body">
    <div id="__next">
        <div class="relative !fixed inset-0 w-full h-full overflow-auto">
            <!-- Main Background -->
            <img alt="bg" class="z-0 w-full h-full object-cover fixed top-0 left-0" src="images/background.png" />
            <div class="absolute inset-0">
                <div class="w-full flex justify-center px-[30px] gap-x-[20px] pb-[10px] mt-[8%] origin-top h-[700px]"
                    style="transform: scale(1);">
                    <div class="relative h-full">

                        <!-- Title Tag Top Left -->
                        <div class="absolute -top-[100px] -left-[15%] max-3xl:-left-[11%] max-2xl:-left-[9%] z-[200]">
                            <div
                                class="absolute z-[2] -translate-x-[10px] -translate-y-[10px] scale-[1.15] select-none">
                                <div class="w-fit" style="transform: none;" tabindex="0">
                                    <div class="relative inline-block w-[90px] h-[90px]">
                                        <img alt="btn" class="z-0 w-[100%] h-[100%]" height="432"
                                            src="spaceship/assets/images/circle-btn-right.png" width="432" />
                                        <div
                                            class="absolute inset-0 flex items-center justify-center w-full h-full cursor-pointer select-none">
                                            <img alt="" class="w-[23px] h-[23px]" height="120" loading="lazy"
                                                src="spaceship/assets/images/X.png" width="120" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="rounded-[24px] absolute h-[64px] flex justify-end items-center"
                                style="border: 2px solid rgb(235, 151, 99); background: linear-gradient(rgb(222, 71, 92) 0%, rgb(251, 154, 117) 100%); box-shadow: rgba(0, 0, 0, 0.396) 3px 3px 0px 1px;">
                                <div class="text-white uppercase pl-[80px]">
                                    <p class="text-lg m-0 leading-[17px] whitespace-nowrap">PET</p>
                                    <p class="text-sm m-0 leading-[17px] pr-[20px] whitespace-nowrap">[PET] Bài thi Nói
                                        1 - Nói</p>
                                </div>
                            </div>
                        </div>

                        <!-- Main White Box (Cyan Board) -->
                        <div class="!w-[1269px] h-full relative bg-center bg-no-repeat bg-[length:100%_100%]"
                            style="background-image: url('images/ed249dfc953d9b8f59d1b0f795e2ab6f4981e41a.png');">

                            <!-- Left Rope -->
                            <img src="images/rope.png" alt="rope" class="absolute z-[-1]" style="    width: 42px;
    height: 286px;
    top: -260px;
    left: 160px;" />
                            <!-- Right Rope -->
                            <img src="images/rope.png" alt="rope" class="absolute z-[-1]" style="    width: 42px;
    height: 286px;
    top: -260px;
    right: 160px;" />

                            <div class="w-full flex flex-col items-center relative h-full">

                                <!-- Part 2 Top Center Banner -->
                                <div class="absolute -top-[50px] left-1/2 -translate-x-1/2 flex items-center justify-center bg-center bg-no-repeat bg-[length:100%_100%] z-20"
                                    style="background-image: url('images/background_title.png'); width: 599px; height: 100.45px;">
                                    <span class="text-white uppercase whitespace-nowrap"
                                        style="font-family: 'SVN-Volte Rounded', sans-serif; font-weight: 700; font-size: 40px; line-height: 124%; letter-spacing: -0.03em; text-align: center; text-shadow: rgba(0, 0, 0, 0.25) 0px 3px 0px;">HƯỚNG
                                        DẪN CHUNG</span>
                                </div>

                                <!-- Center Content: Title Badge and 2 Images -->
                                <div class="mt-[60px] w-full h-[calc(100%-63px)] flex flex-col items-center relative">
                                    <div class="w-full h-[calc(100%-105px)] pt-[20px]">

                                        <div class="w-full flex justify-center mb-[20px]">
                                            <div class="relative cursor-pointer">
                                                <img alt="" class="z-0 h-[50px] w-[350px]"
                                                    src="spaceship/assets/images/red-badge.png" />
                                                <div
                                                    class="absolute inset-0 flex justify-center items-center select-none pb-1">
                                                    <span
                                                        class="text-[20px] font-[800] text-center text-white uppercase"
                                                        style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5), 0px 2px 4px rgba(0,0,0,0.4);">BẠN
                                                        1 - CLICK ĐỂ LẬT ẢNH</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="flex justify-center gap-[40px] h-[340px]">
                                            <div
                                                class="h-[340px] w-[480px] bg-white rounded-[24px] p-[16px] box-border shadow-lg relative cursor-pointer group hover:scale-[1.02] transition-transform duration-300">
                                                <img alt="pic 1"
                                                    class="w-full h-full object-cover rounded-[16px] shadow-sm"
                                                    src="images/e0b46b6303512c63e133be898f71f60ed27218df.png" />
                                            </div>
                                            <div
                                                class="h-[340px] w-[480px] bg-white rounded-[24px] p-[16px] box-border shadow-lg relative cursor-pointer group hover:scale-[1.02] transition-transform duration-300">
                                                <img alt="pic 2"
                                                    class="w-full h-full object-cover rounded-[16px] shadow-sm"
                                                    src="images/bc4db372db96ebd38f1f149536948c1fc9b1490a.png" />
                                            </div>
                                        </div>

                                    </div>

                                    <!-- Bottom Avatars & Progress -->
                                    <div class="flex w-[990px] justify-between pb-[10px] px-[20px]">
                                        <div class="relative select-none" style="opacity: 1;">
                                            <div>
                                                <div class="relative flex">
                                                    <img alt="" class="z-0 h-[57px] w-[258px]" height="276"
                                                        src="spaceship/assets/images/red-badge.png" width="1209" />
                                                    <div
                                                        class="absolute inset-0 flex justify-center items-center pt-[12px]">
                                                        <div
                                                            class="text-white leading-5 font-normal text-center m-0 w-full select-none">
                                                            <p class="text-[18px] px-[60px] m-0 truncate select-none">
                                                                Bingo</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="absolute top-[7px] -right-[58px]">
                                                <img alt="" class="z-0 w-[115px] h-[84px] relative" height="428"
                                                    src="spaceship/assets/images/red-wrapper.png" width="512" />
                                                <div
                                                    class="absolute inset-0 flex justify-center items-center w-full h-full">
                                                    <div class="relative h-full">
                                                        <img alt=""
                                                            class="w-[68px] h-[68px] object-cover rounded-full select-none"
                                                            draggable="false" height="77" loading="lazy"
                                                            src="https://exam.flyer.us/_next/static/media/bingo.b63bc1e9.png"
                                                            width="77" />
                                                        <div
                                                            class="flex items-center justify-center absolute w-full h-full top-0 bg-black bg-opacity-60 rounded-full text-white cursor-pointer">
                                                            <img alt="play" height="20" loading="lazy"
                                                                src="spaceship/assets/images/ic-play.png" width="20" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="relative select-none" style="opacity: 0.5;">
                                            <div>
                                                <div class="relative flex">
                                                    <img alt="" class="z-0 h-[57px] w-[258px]" height="288"
                                                        src="spaceship/assets/images/blue-badge.png" width="1261" />
                                                    <div
                                                        class="absolute inset-0 flex justify-center items-center pt-[12px]">
                                                        <div
                                                            class="text-white leading-5 font-normal text-center m-0 w-full select-none">
                                                            <p class="text-[18px] px-[60px] m-0 truncate select-none">
                                                                Hoàng Nam</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="absolute top-[7px] -left-[58px]">
                                                <img alt="" class="z-0 w-[115px] h-[84px] relative" height="464"
                                                    src="spaceship/assets/images/blue-wrapper.png" width="632" />
                                                <div
                                                    class="absolute inset-0 flex justify-center items-center w-full h-full">
                                                    <div class="relative h-full">
                                                        <img alt=""
                                                            class="w-[68px] h-[68px] object-cover rounded-full select-none"
                                                            draggable="false" height="77" loading="lazy"
                                                            src="https://statics.flyer.vn/avatar/e34bc327035140b38b87d0838c92f6fe"
                                                            width="77" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <p class="absolute left-1/2 -translate-x-1/2 text-center whitespace-nowrap text-black font-normal text-sm m-0"
                                        style="bottom: 95px;">Ấn biểu tượng micro để trả lời</p>

                                    <div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center"
                                        style="bottom: -44px;">
                                        <div class="block relative">
                                            <img alt="wrapper" class="z-0"
                                                src="spaceship/assets/images/blue-wrapper.png"
                                                style="width: 158px; height: 116px;" />
                                            <div
                                                class="absolute inset-0 flex justify-center items-center w-full h-full">
                                                <div class="absolute" style="top: -20px;">
                                                    <img alt="timer" class="z-0"
                                                        src="spaceship/assets/images/timer-badge.png"
                                                        style="width: 104px; height: 45px;" />
                                                    <div class="absolute inset-0 flex items-center justify-center">
                                                        <p class="text-white text-center text-[20px] font-normal m-0"
                                                            style="margin: 0;">0:10</p>
                                                    </div>
                                                </div>
                                                <img alt="micro" loading="lazy" class="cursor-pointer"
                                                    src="spaceship/assets/images/micro.png"
                                                    style="width: 51px; height: 51px;" />
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </div>

        <div aria-hidden="true" class="fixed right-0 xl:bottom-[3.5vw] bottom-[10%] cursor-pointer z-[100] opacity-100">
            <img alt="flyer report" class="xl:w-[2vw] w-[3vw]" height="264" loading="lazy"
                src="spaceship/assets/images/button_feedback_vi.png" width="92" />
        </div>
    </div>
</body>

</html>
